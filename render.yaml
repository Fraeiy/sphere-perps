# Render Blueprint — FREE tier
# If Blueprint fails with "invalid repository", use manual deploy:
# https://dashboard.render.com/create?type=web
# See scripts/render-fix.md

services:
  - type: web
    name: sphere-perps-api
    runtime: node
    plan: free
    region: oregon
    repo: https://github.com/Fraeiy/sphere-perps
    branch: main
    buildCommand: npm install && npm run db:generate -w backend && npm run build -w backend
    startCommand: npm run db:push -w backend && npm run start -w backend
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://sphere-perps.vercel.app
      - key: SPHERE_ORACLE_API_KEY
        value: sk_ddc3cfcc001e4a28ac3fad7407f99590
      - key: SPHERE_WALLET_API_URL
        value: https://wallet-api.unicity.network
      - key: SPHERE_TREASURY_NAMETAG
        value: sphere-perps-treasury
      - key: AI_PROVIDER
        value: mock