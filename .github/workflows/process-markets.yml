name: Process Markets Cron

on:
  schedule:
    - cron: '*/1 * * * *'
  workflow_dispatch:

jobs:
  engine:
    runs-on: ubuntu-latest
    steps:
      - name: Invoke process-markets Edge Function
        run: |
          curl -sf -X POST \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            "${{ secrets.SUPABASE_URL }}/functions/v1/process-markets"